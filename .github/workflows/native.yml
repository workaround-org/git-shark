name: Native

on:
  push:
    branches: [main]
  pull_request:

jobs:
  native-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Native build & integration tests
        run: ./mvnw -B verify -Dnative -Dquarkus.native.container-build=true
